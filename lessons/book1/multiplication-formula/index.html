<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>主題 002 乘法公式｜Ya-Wen 的高中數學教室</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [["$", "$"], ["\\(", "\\)"]] },
      options: { enableMenu: false }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    :root {
      --bg: #20272a;
      --panel: rgba(9, 16, 18, 0.54);
      --panel-strong: rgba(0, 0, 0, 0.24);
      --line: rgba(255, 255, 255, 0.26);
      --text: #f8f2e8;
      --muted: rgba(255, 255, 255, 0.72);
      --chalk: #fffdf4;
      --cream: #f1d2a0;
      --pink: #d37aa9;
      --teal: #80c7c4;
      --purple: #b9a4ee;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 22px;
      background:
        radial-gradient(circle at 88% 84%, rgba(255,255,255,.12) 0 18px, transparent 19px),
        var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    a { color: inherit; text-decoration: none; }

    .page {
      width: min(1180px, 100%);
      min-height: calc(100vh - 44px);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .lesson-card,
    .note-panel {
      border: 2px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.42), 0 18px 34px rgba(0,0,0,.22);
    }

    .hero {
      position: relative;
      padding: clamp(20px, 4vw, 34px);
      padding-right: 160px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        rgba(9, 16, 18, 0.66);
      background-size: 34px 34px;
    }

    .home-link {
      position: absolute;
      top: 18px;
      right: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 15px;
      border-radius: 999px;
      background: var(--cream);
      color: #17151d;
      font-weight: 900;
      white-space: nowrap;
    }

    .home-link:hover { filter: brightness(1.06); }

    .kicker {
      margin: 0 0 10px;
      color: var(--cream);
      font-weight: 900;
      font-size: clamp(1rem, 2vw, 1.25rem);
    }

    h1 {
      margin: 0;
      color: var(--chalk);
      font-size: clamp(3rem, 10vw, 6.6rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .lesson-card {
      min-height: 220px;
      padding: 18px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
      background: var(--panel-strong);
    }

    .lesson-card h2 {
      margin: 0;
      color: var(--chalk);
      font-size: 1.55rem;
      line-height: 1.25;
    }

    .lesson-card p {
      margin: 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.6;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.13);
      color: #fff;
      font-size: .86rem;
      font-weight: 900;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-height: 42px;
      padding: 9px 16px;
      border-radius: 999px;
      background: var(--pink);
      color: #151719;
      font-weight: 900;
    }

    .button.teal { background: var(--teal); }

    .note-panel {
      padding: 18px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.7;
    }

    .note-panel strong { color: var(--cream); }

    @media (max-width: 920px) {
      body { padding: 14px; }
      .grid { grid-template-columns: 1fr; }
      .lesson-card { min-height: 190px; }
    }

    @media (max-width: 560px) {
      .hero {
        padding: 70px 18px 18px;
      }

      .home-link {
        left: 18px;
        right: auto;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <a class="home-link" href="../../../index.html">回首頁</a>
      <p class="kicker">高一數學｜第一章 數與式｜主題 002 乘法公式</p>
      <h1>乘法公式</h1>
    </header>

    <section class="grid" aria-label="乘法公式教材清單">
      <article class="lesson-card">
        <div class="tag-row">
          <span class="tag">互動題</span>
          <span class="tag">公式拼圖</span>
        </div>
        <h2>乘法公式拼圖</h2>
        <p>點選或拖拉公式零件，將常見乘法公式拼回完整展開式。</p>
        <a class="button" href="puzzle.html">開始練習</a>
      </article>

      <article class="lesson-card">
        <div class="tag-row">
          <span class="tag">練習題</span>
          <span class="tag">建置中</span>
        </div>
        <h2>乘法公式練習</h2>
        <p>之後可加入展開、化簡與因式分解的分層練習。</p>
        <span class="button teal">教材建置中</span>
      </article>
    </section>

    <section class="note-panel">
      <strong>後續新增方式：</strong>乘法公式相關教材可繼續放在這個資料夾中，例如
      <code>practice.html</code>、<code>quiz.html</code>。
    </section>
  </main>
</body>
</html>
