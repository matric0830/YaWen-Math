<div class="page"><header><section class="hero"><a class="back-button" href="../index.html">回上一頁</a><p class="lesson-kicker">高一數學｜第一章 數與式｜主題 001 數系</p><h1>循環小數化分數</h1></section></header>
  <main><section class="card" id="gameCard"><div class="question-top"><div class="level" id="levelText">第 1 關</div><div class="question-actions"><button onclick="event.stopPropagation(); nextQuestion()" class="next">下一題</button><button onclick="event.stopPropagation(); resetGame()" class="secondary">重新開始</button></div></div><div class="study-area" id="studyArea"><div class="flip-shell locked" id="flipShell" onclick="toggleFlashcard()" title="答題後點擊題目翻面看詳解"><div class="flip-card"><div class="face front"><div class="formula-main" id="formula"></div><div class="tap-note">答題後點題目看詳解</div></div><div class="face back"><div class="q-panel"><div class="mini-title">題目</div><div class="formula-small" id="backQuestion"></div></div><div class="explain-panel"><div class="mini-title">詳解</div><ol class="steps" id="detailSteps"></ol></div><div class="tap-note">再點一次回題目</div></div></div></div><div class="answer-area" id="answerArea"><div class="choice-grid" id="choices"></div><div class="feedback" id="feedback"></div></div></div><div class="challenge-end" id="challengeEnd"><h2>挑戰完成！</h2><p id="endMessage"></p><button onclick="resetGame()" class="next">再練一次</button></div></section><aside class="card side"><h3>目前戰況</h3><div class="progress-wrap"><div class="progress" id="progress"></div></div><div class="score"><div><span>答對</span><strong id="rightCount">0</strong></div><div><span>題數</span><strong id="totalCount">1/6</strong></div></div><section class="rule"><button type="button" class="secondary rule-toggle" onclick="toggleRules()" id="ruleBtn">解題規則</button><div class="rule-content" id="ruleContent"><ol><li>觀察循環節與不循環小數位數。</li><li>使用公式後選出最簡分數。</li><li>答題後點題目卡片看詳解。</li></ol></div></section></aside></main>
</div>
<script>
const allQuestions=[{"prompt": "\\[0.\\overline{7}=？\\]", "choices": ["\\(\\dfrac{7}{9}\\)", "\\(\\dfrac{7}{10}\\)", "\\(\\dfrac{7}{99}\\)", "\\(\\dfrac{1}{7}\\)"], "answer": "\\(\\dfrac{7}{9}\\)", "steps": ["循環節是 \\(7\\)，有 1 位。", "分母放 1 個 \\(9\\)。", "\\[0.\\overline{7}=\\dfrac{7}{9}\\]"]}, {"prompt": "\\[0.\\overline{23}=？\\]", "choices": ["\\(\\dfrac{23}{90}\\)", "\\(\\dfrac{23}{99}\\)", "\\(\\dfrac{23}{100}\\)", "\\(\\dfrac{2}{23}\\)"], "answer": "\\(\\dfrac{23}{99}\\)", "steps": ["循環節是 \\(23\\)，有 2 位。", "分母放 2 個 \\(9\\)。", "\\[0.\\overline{23}=\\dfrac{23}{99}\\]"]}, {"prompt": "\\[1.\\overline{2}=？\\]", "choices": ["\\(\\dfrac{12}{9}\\)", "\\(\\dfrac{11}{9}\\)", "\\(\\dfrac{10}{9}\\)", "\\(\\dfrac{13}{9}\\)"], "answer": "\\(\\dfrac{11}{9}\\)", "steps": ["去掉小數點到一個循環節為止：\\(12\\)。", "循環節前的整數是 \\(1\\)。", "\\[1.\\overline{2}=\\dfrac{12-1}{9}=\\dfrac{11}{9}\\]"]}, {"prompt": "\\[2.\\overline{35}=？\\]", "choices": ["\\(\\dfrac{235}{99}\\)", "\\(\\dfrac{233}{99}\\)", "\\(\\dfrac{232}{99}\\)", "\\(\\dfrac{223}{99}\\)"], "answer": "\\(\\dfrac{233}{99}\\)", "steps": ["去掉小數點到一個循環節為止：\\(235\\)。", "循環節前的整數是 \\(2\\)。", "\\[2.\\overline{35}=\\dfrac{235-2}{99}=\\dfrac{233}{99}\\]"]}, {"prompt": "\\[0.1\\overline{4}=？\\]", "choices": ["\\(\\dfrac{14}{90}\\)", "\\(\\dfrac{13}{90}\\)", "\\(\\dfrac{13}{99}\\)", "\\(\\dfrac{1}{14}\\)"], "answer": "\\(\\dfrac{13}{90}\\)", "steps": ["不循環部分有 1 位，循環節有 1 位。", "分母是 \\(90\\)。", "\\[0.1\\overline{4}=\\dfrac{14-1}{90}=\\dfrac{13}{90}\\]"]}, {"prompt": "\\[0.2\\overline{1}=？\\]", "choices": ["\\(\\dfrac{21}{90}\\)", "\\(\\dfrac{19}{90}\\)", "\\(\\dfrac{2}{90}\\)", "\\(\\dfrac{19}{99}\\)"], "answer": "\\(\\dfrac{19}{90}\\)", "steps": ["不循環部分是 \\(2\\)，循環節是 \\(1\\)。", "分母是 \\(90\\)。", "\\[0.2\\overline{1}=\\dfrac{21-2}{90}=\\dfrac{19}{90}\\]"]}, {"prompt": "\\[1.3\\overline{2}=？\\]", "choices": ["\\(\\dfrac{132}{90}\\)", "\\(\\dfrac{119}{90}\\)", "\\(\\dfrac{118}{90}\\)", "\\(\\dfrac{119}{99}\\)"], "answer": "\\(\\dfrac{119}{90}\\)", "steps": ["到一個循環節為止是 \\(132\\)。", "循環節前是 \\(13\\)。", "\\[1.3\\overline{2}=\\dfrac{132-13}{90}=\\dfrac{119}{90}\\]"]}, {"prompt": "\\[2.4\\overline{7}=？\\]", "choices": ["\\(\\dfrac{247}{90}\\)", "\\(\\dfrac{223}{90}\\)", "\\(\\dfrac{224}{90}\\)", "\\(\\dfrac{223}{99}\\)"], "answer": "\\(\\dfrac{223}{90}\\)", "steps": ["到一個循環節為止是 \\(247\\)。", "循環節前是 \\(24\\)。", "\\[2.4\\overline{7}=\\dfrac{247-24}{90}=\\dfrac{223}{90}\\]"]}, {"prompt": "\\[0.12\\overline{5}=？\\]", "choices": ["\\(\\dfrac{125}{900}\\)", "\\(\\dfrac{113}{900}\\)", "\\(\\dfrac{112}{900}\\)", "\\(\\dfrac{113}{990}\\)"], "answer": "\\(\\dfrac{113}{900}\\)", "steps": ["不循環部分有 2 位，循環節有 1 位。", "分母是 \\(900\\)。", "\\[0.12\\overline{5}=\\dfrac{125-12}{900}=\\dfrac{113}{900}\\]"]}, {"prompt": "\\[3.1\\overline{28}=？\\]", "choices": ["\\(\\dfrac{3128}{990}\\)", "\\(\\dfrac{3097}{990}\\)", "\\(\\dfrac{3097}{900}\\)", "\\(\\dfrac{3127}{990}\\)"], "answer": "\\(\\dfrac{3097}{990}\\)", "steps": ["不循環部分有 1 位，循環節有 2 位。", "分母是 \\(990\\)。", "\\[3.1\\overline{28}=\\dfrac{3128-31}{990}=\\dfrac{3097}{990}\\]"]}, {"prompt": "\\[0.\\overline{6}=？\\]", "choices": ["\\(\\dfrac{6}{9}\\)", "\\(\\dfrac{2}{3}\\)", "\\(\\dfrac{3}{2}\\)", "\\(\\dfrac{6}{99}\\)"], "answer": "\\(\\dfrac{2}{3}\\)", "steps": ["先代公式：\\(0.\\overline{6}=\\dfrac{6}{9}\\)。", "分子分母同除以 \\(3\\)。", "\\[\\dfrac{6}{9}=\\dfrac{2}{3}\\]"]}, {"prompt": "\\[0.\\overline{18}=？\\]", "choices": ["\\(\\dfrac{18}{99}\\)", "\\(\\dfrac{2}{11}\\)", "\\(\\dfrac{1}{18}\\)", "\\(\\dfrac{18}{90}\\)"], "answer": "\\(\\dfrac{2}{11}\\)", "steps": ["先代公式：\\(0.\\overline{18}=\\dfrac{18}{99}\\)。", "分子分母同除以 \\(9\\)。", "\\[\\dfrac{18}{99}=\\dfrac{2}{11}\\]"]}, {"prompt": "\\[1.\\overline{6}=？\\]", "choices": ["\\(\\dfrac{16}{9}\\)", "\\(\\dfrac{15}{9}\\)", "\\(\\dfrac{5}{3}\\)", "\\(\\dfrac{4}{3}\\)"], "answer": "\\(\\dfrac{5}{3}\\)", "steps": ["先代公式：\\(1.\\overline{6}=\\dfrac{16-1}{9}=\\dfrac{15}{9}\\)。", "分子分母同除以 \\(3\\)。", "\\[\\dfrac{15}{9}=\\dfrac{5}{3}\\]"]}, {"prompt": "\\[0.3\\overline{6}=？\\]", "choices": ["\\(\\dfrac{36}{90}\\)", "\\(\\dfrac{33}{90}\\)", "\\(\\dfrac{11}{30}\\)", "\\(\\dfrac{3}{11}\\)"], "answer": "\\(\\dfrac{11}{30}\\)", "steps": ["先代公式：\\(0.3\\overline{6}=\\dfrac{36-3}{90}=\\dfrac{33}{90}\\)。", "分子分母同除以 \\(3\\)。", "\\[\\dfrac{33}{90}=\\dfrac{11}{30}\\]"]}, {"prompt": "\\[0.4\\overline{6}=？\\]", "choices": ["\\(\\dfrac{42}{90}\\)", "\\(\\dfrac{7}{15}\\)", "\\(\\dfrac{14}{30}\\)", "\\(\\dfrac{4}{15}\\)"], "answer": "\\(\\dfrac{7}{15}\\)", "steps": ["先代公式：\\(0.4\\overline{6}=\\dfrac{46-4}{90}=\\dfrac{42}{90}\\)。", "分子分母同除以 \\(6\\)。", "\\[\\dfrac{42}{90}=\\dfrac{7}{15}\\]"]}, {"prompt": "\\[1.2\\overline{6}=？\\]", "choices": ["\\(\\dfrac{114}{90}\\)", "\\(\\dfrac{19}{15}\\)", "\\(\\dfrac{38}{30}\\)", "\\(\\dfrac{17}{15}\\)"], "answer": "\\(\\dfrac{19}{15}\\)", "steps": ["先代公式：\\(1.2\\overline{6}=\\dfrac{126-12}{90}=\\dfrac{114}{90}\\)。", "分子分母同除以 \\(6\\)。", "\\[\\dfrac{114}{90}=\\dfrac{19}{15}\\]"]}, {"prompt": "\\[0.14\\overline{2}=？\\]", "choices": ["\\(\\dfrac{128}{900}\\)", "\\(\\dfrac{32}{225}\\)", "\\(\\dfrac{16}{225}\\)", "\\(\\dfrac{32}{900}\\)"], "answer": "\\(\\dfrac{32}{225}\\)", "steps": ["先代公式：\\(0.14\\overline{2}=\\dfrac{142-14}{900}=\\dfrac{128}{900}\\)。", "分子分母同除以 \\(4\\)。", "\\[\\dfrac{128}{900}=\\dfrac{32}{225}\\]"]}, {"prompt": "\\[0.43\\overline{8}=？\\]", "choices": ["\\(\\dfrac{395}{900}\\)", "\\(\\dfrac{79}{180}\\)", "\\(\\dfrac{79}{900}\\)", "\\(\\dfrac{43}{180}\\)"], "answer": "\\(\\dfrac{79}{180}\\)", "steps": ["先代公式：\\(0.43\\overline{8}=\\dfrac{438-43}{900}=\\dfrac{395}{900}\\)。", "分子分母同除以 \\(5\\)。", "\\[\\dfrac{395}{900}=\\dfrac{79}{180}\\]"]}, {"prompt": "\\[2.15\\overline{6}=？\\]", "choices": ["\\(\\dfrac{1941}{900}\\)", "\\(\\dfrac{647}{300}\\)", "\\(\\dfrac{647}{900}\\)", "\\(\\dfrac{2156}{900}\\)"], "answer": "\\(\\dfrac{647}{300}\\)", "steps": ["先代公式：\\(2.15\\overline{6}=\\dfrac{2156-215}{900}=\\dfrac{1941}{900}\\)。", "分子分母同除以 \\(3\\)。", "\\[\\dfrac{1941}{900}=\\dfrac{647}{300}\\]"]}, {"prompt": "\\[0.8\\overline{43}=？\\]", "choices": ["\\(\\dfrac{835}{990}\\)", "\\(\\dfrac{167}{198}\\)", "\\(\\dfrac{843}{990}\\)", "\\(\\dfrac{167}{990}\\)"], "answer": "\\(\\dfrac{167}{198}\\)", "steps": ["先代公式：\\(0.8\\overline{43}=\\dfrac{843-8}{990}=\\dfrac{835}{990}\\)。", "分子分母同除以 \\(5\\)。", "\\[\\dfrac{835}{990}=\\dfrac{167}{198}\\]"]}];
const challengeSize=6;
const completionMessages={high:"循環小數化分數的公式與約分都很穩。",mid:"觀念不錯，再留意分母 9 與 0 的個數。",low:"建議先回顧循環節與不循環位數，再重新練習。"};
let currentSet=[],currentIndex=0,right=0,answered=false;
function typesetMath(){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise()}
function shuffle(arr){return[...arr].sort(()=>Math.random()-.5)}
function renderMath(value){return String(value||'')}
function playSound(ok){try{const AudioContext=window.AudioContext||window.webkitAudioContext;if(!AudioContext)return;const ctx=new AudioContext();const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type=ok?'sine':'triangle';osc.frequency.setValueAtTime(ok?660:220,ctx.currentTime);gain.gain.setValueAtTime(0.0001,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.16,ctx.currentTime+0.02);gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.18);osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+0.2)}catch(e){}}
function startGame(){currentSet=shuffle(allQuestions).slice(0,Math.min(challengeSize,allQuestions.length));currentIndex=0;right=0;answered=false;document.getElementById('challengeEnd').classList.remove('show');document.getElementById('studyArea').style.display='grid';updateStats();renderQuestion()}
function renderQuestion(){const item=currentSet[currentIndex];if(!item)return finishGame();answered=false;const flip=document.getElementById('flipShell');flip.classList.remove('flipped');flip.classList.add('locked');document.getElementById('levelText').textContent=`第 ${currentIndex+1} 關 / 共 ${currentSet.length} 關`;document.getElementById('formula').innerHTML=renderMath(item.prompt);document.getElementById('backQuestion').innerHTML=renderMath(item.prompt);document.getElementById('detailSteps').innerHTML=(item.steps||[]).map(x=>`<li>${x}</li>`).join('');const choicesBox=document.getElementById('choices');choicesBox.innerHTML='';shuffle(item.choices).forEach(c=>{const btn=document.createElement('button');btn.className='choice';btn.innerHTML=renderMath(c);btn.dataset.choice=c;btn.onclick=ev=>{ev.stopPropagation();checkAnswer(btn,c)};choicesBox.appendChild(btn)});typesetMath()}
function checkAnswer(btn,choice){if(answered)return;answered=true;const item=currentSet[currentIndex];document.querySelectorAll('.choice').forEach(b=>{if(b.dataset.choice===item.answer)b.classList.add('correct');else if(b===btn)b.classList.add('wrong')});const ok=choice===item.answer;if(ok)right++;playSound(ok);document.getElementById('flipShell').classList.remove('locked');updateStats()}
function nextQuestion(){if(!currentSet.length)return;currentIndex++;if(currentIndex>=currentSet.length)finishGame();else renderQuestion();updateStats()}
function resetGame(){startGame()}
function finishGame(){document.getElementById('studyArea').style.display='none';document.getElementById('challengeEnd').classList.add('show');const percent=currentSet.length?Math.round(right/currentSet.length*100):0;let msg=`你完成 ${currentSet.length} 題，答對 ${right} 題，正確率 ${percent}%。`;if(percent>=90)msg+=' '+completionMessages.high;else if(percent>=70)msg+=' '+completionMessages.mid;else msg+=' '+completionMessages.low;document.getElementById('endMessage').textContent=msg}
function updateStats(){document.getElementById('rightCount').textContent=right;document.getElementById('totalCount').textContent=currentSet.length?`${Math.min(currentIndex+1,currentSet.length)}/${currentSet.length}`:'0';const progress=currentSet.length?Math.min(currentIndex,currentSet.length)/currentSet.length*100:0;document.getElementById('progress').style.width=progress+'%'}
function toggleRules(){const box=document.getElementById('ruleContent'),btn=document.getElementById('ruleBtn');box.classList.toggle('show');btn.textContent=box.classList.contains('show')?'收起解題規則':'解題規則';typesetMath()}
function toggleFlashcard(){if(!currentSet.length||!answered)return;document.getElementById('flipShell').classList.toggle('flipped');typesetMath()}
window.addEventListener('load',startGame);
</script>
