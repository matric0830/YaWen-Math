<body>
<div class="page"><header><section class="hero"><button class="back-button" type="button" onclick="location.href='index.html'">回上一頁</button><p class="lesson-kicker">高一數學｜第一章 數與式｜主題 003 雙重根號</p><h1>估算特訓</h1></section></header>
  <main><section class="card" id="gameCard"><div class="question-top"><div class="level" id="levelText">第 1 關 / 共 6 關</div><div class="question-actions"><button onclick="event.stopPropagation(); nextQuestion()" class="next">下一題</button><button onclick="event.stopPropagation(); resetGame()" class="secondary">重新開始</button></div></div><div class="study-area" id="studyArea"><div class="flip-shell locked" id="flipShell" onclick="toggleFlashcard()" title="答題後點擊題目翻面看詳解"><div class="flip-card"><div class="face front"><div class="formula-main" id="formula">\[\sqrt{a\pm2\sqrt{b}}\]</div><div class="tap-note">答題後點題目看詳解</div></div><div class="face back"><div class="q-panel"><div class="mini-title">題目</div><div class="formula-small" id="backQuestion"></div></div><div class="explain-panel"><div class="mini-title">詳解</div><ol class="steps" id="detailSteps"></ol></div><div class="tap-note">再點一次回題目</div></div></div></div><div class="answer-area" id="answerArea"><div class="choice-grid" id="choices"></div><div class="feedback" id="feedback"></div></div></div><div class="challenge-end" id="challengeEnd"><h2>挑戰完成！</h2><p id="endMessage"></p><button onclick="startGame(currentMode || 'basic')" class="next">再練一次</button></div></section><aside class="card side"><h3>目前戰況</h3><div class="progress-wrap"><div class="progress" id="progress"></div></div><div class="score"><div><span>答對</span><strong id="rightCount">0</strong></div><div><span>題數</span><strong id="totalCount">1/6</strong></div></div><section class="rule"><button type="button" class="secondary rule-toggle" onclick="toggleRules()" id="ruleBtn">解題規則</button><div class="rule-content" id="ruleContent"><ol><li>先看成 \(\sqrt{a\pm2\sqrt{b}}\)。</li><li>找 \(m+n=a\)，\(mn=b\)。</li><li>判斷兩根號相加？相減？</li><li>找不到漂亮整數，再估算。</li></ol></div></section></aside></main>
</div>
<script>
const allQuestions=[
{mode:'basic',q:'√(5 + 2√6)',ans:'√3 + √2',choices:['√3 + √2','√3 - √2','√6 + 1','√6 - 1'],hint:'找 m+n=5、mn=6，所以 m=3, n=2。'},
{mode:'basic',q:'√(5 - 2√6)',ans:'√3 - √2',choices:['√3 + √2','√3 - √2','√6 + 1','√6 - 1'],hint:'找 m+n=5、mn=6，所以 m=3, n=2。'},
{mode:'basic',q:'√(10 + 6√3)',ans:'3 + √3',choices:['3 + √3','3 - √3','√7 + √3','√7 - √3'],hint:'6√3 = 2√27，找 m+n=10、mn=27。'},
{mode:'basic',q:'√(10 - 6√3)',ans:'3 - √3',choices:['3 + √3','3 - √3','√7 + √3','√7 - √3'],hint:'6√3 = 2√27，找 m+n=10、mn=27。'},
{mode:'basic',q:'√(11 + 4√7)',ans:'√7 + 2',choices:['√7 + 2','√7 - 2','√8 + √3','√8 - √3'],hint:'4√7 = 2√28，找 m+n=11、mn=28。'},
{mode:'basic',q:'√(13 - 4√10)',ans:'√10 - √3',choices:['√10 + √3','√10 - √3','√7 + √6','√7 - √6'],hint:'4√10 = 2√40，找 m+n=13、mn=40。'},
{mode:'estimate',q:'√(5 + 2√3)',ans:'約 2',choices:['約 1','約 2','約 3','約 4'],hint:'√3≈1.732，內部約 8.464。'},
{mode:'estimate',q:'√(12 - 2√20)',ans:'約 1',choices:['約 0','約 1','約 2','約 3'],hint:'√20≈4.472，所以內部約 3.056。'},
{mode:'estimate',q:'√(8 + 2√5)',ans:'約 3',choices:['約 2','約 3','約 4','約 5'],hint:'√5≈2.236，內部約 12.472。'},
{mode:'estimate',q:'√(10 - 2√7)',ans:'約 2',choices:['約 1','約 2','約 3','約 4'],hint:'√7≈2.646，內部約 4.708。'},
{mode:'estimate',q:'√(6 + 2√2)',ans:'約 2',choices:['約 1','約 2','約 3','約 4'],hint:'√2≈1.414，內部約 8.828。'},
{mode:'estimate',q:'√(7 - 2√5)',ans:'約 1',choices:['約 0','約 1','約 2','約 3'],hint:'√5≈2.236，內部約 2.528。'},
{mode:'mixed',q:'√(6 + 2√5)',ans:'√5 + 1',choices:['√5 + 1','√5 - 1','√3 + √2','約 3'],hint:'找 m+n=6、mn=5。'},
{mode:'mixed',q:'√(7 + 2√10)',ans:'√5 + √2',choices:['√5 + √2','√5 - √2','√10 + 1','約 4'],hint:'找 m+n=7、mn=10。'},
{mode:'mixed',q:'√(9 + 2√14)',ans:'√7 + √2',choices:['√7 + √2','√7 - √2','√14 + 1','約 4'],hint:'找 m+n=9、mn=14。'},
{mode:'mixed',q:'√(12 - 2√20)',ans:'約 1',choices:['√10 - √2','√8 - 2','√5 - 1','約 1'],hint:'找 m+n=12、mn=20；沒有漂亮整數組合。√20≈4.472。'},
{mode:'mixed',q:'√(5 + 2√3)',ans:'約 2',choices:['√3 + √2','√3 - √2','√4 + 1','約 2'],hint:'找 m+n=5、mn=3；沒有漂亮整數組合。√3≈1.732。'},
{mode:'mixed',q:'√(8 - 2√7)',ans:'√7 - 1',choices:['√7 + 1','√7 - 1','√5 - √3','約 2'],hint:'找 m+n=8、mn=7。'}
];
let currentSet=[],currentIndex=0,right=0,answered=false,currentMode='basic';
function texExpr(raw){let s=String(raw).trim();const convertInner=x=>x.replace(/√\s*(\d+)/g,'\\sqrt{$1}').replace(/√\s*([a-zA-Z])/g,'\\sqrt{$1}').replace(/\s*([+\-])\s*/g,' $1 ').trim();const outer=s.match(/^√\((.*)\)$/);if(outer)return '\\sqrt{'+convertInner(outer[1])+'}';return convertInner(s)}
function renderChoice(raw){const t=String(raw);if(t.startsWith('約'))return t;return '\\('+texExpr(t)+'\\)'}
function typesetMath(){if(window.MathJax&&MathJax.typesetPromise)MathJax.typesetPromise()}
function shuffle(arr){return[...arr].sort(()=>Math.random()-.5)}
function setActiveTab(mode){['basic','estimate','mixed'].forEach(m=>{const tab=document.getElementById('tab-'+m);if(tab)tab.classList.toggle('active',m===mode)})}
function parseQuestion(item){const m=item.q.match(/^√\((\d+)\s*([+\-])\s*(\d+)√(\d+)\)$/);if(!m)return null;const a=Number(m[1]),sign=m[2],coef=Number(m[3]),rad=Number(m[4]);return{a,sign,coef,rad,b:coef*coef*rad/4}}
function answerTerms(ans){if(ans.startsWith('約'))return[];return ans.split(/\s+[+\-]\s+/).map(x=>x.trim())}
function termSquare(t){t=t.trim();if(t.startsWith('√'))return Number(t.replace('√',''));return Number(t)*Number(t)}
function fmt3(x){return Number(x.toFixed(3)).toString()}
function fmt2(x){return Number(x.toFixed(2)).toString()}
function extractApprox(ans){const m=String(ans).match(/([0-9]+(?:\.[0-9]+)?)/);return m?Number(m[1]):null}
function detailSteps(item){
  const p=parseQuestion(item), final=renderChoice(item.ans);
  if(!p) return ['檢查題型。','判斷兩根號相加？相減？',`最後答案：${final}`];
  if(item.ans.startsWith('約')){
    const innerRad = p.coef * p.coef * p.rad;
    const rootInnerRad = Math.sqrt(innerRad);
    const rootInnerRadTxt = fmt3(rootInnerRad);
    const inner = p.sign==='+' ? p.a + rootInnerRad : p.a - rootInnerRad;
    const innerTxt = fmt3(inner);
    const sqrtInner = Math.sqrt(inner);
    const sqrtInnerTxt = fmt3(sqrtInner);
    const finalTxt = Math.floor(sqrtInner).toString();
    const signTex = p.sign==='+' ? '+' : '-';
    return [
      String.raw`找：\(m+n=${p.a}\)，\(mn=${p.b}\)。`,
      '沒有漂亮的整數組合，所以估算。',
      String.raw`\(${texExpr(item.q)} = \sqrt{${p.a} ${signTex} \sqrt{${innerRad}}}\)`,
      String.raw`\(\sqrt{${p.a} ${signTex} \sqrt{${innerRad}}} \approx \sqrt{${p.a} ${signTex} ${rootInnerRadTxt}} = \sqrt{${innerTxt}}\)`,
      String.raw`\(\sqrt{${innerTxt}} \approx ${sqrtInnerTxt}\)`,
      String.raw`所以：\(${texExpr(item.q)} \approx ${finalTxt}\)`
    ];
  }
  const terms=answerTerms(item.ans), m=termSquare(terms[0]), n=termSquare(terms[1]);
  return [
    String.raw`找數字：\(m+n=${p.a}\)，\(mn=${p.b}\)，所以可取 \(m=${m}\)，\(n=${n}\)。`,
    '判斷兩根號相加？相減？',
    `最後答案：${final}`
  ];
}

function playSound(ok){
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if(!AudioContext) return;
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = ok ? 'sine' : 'triangle';
    osc.frequency.setValueAtTime(ok ? 660 : 220, ctx.currentTime);
    if(ok) osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.12);
    else osc.frequency.exponentialRampToValueAtTime(160, ctx.currentTime + 0.16);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.16, ctx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.2);
  }catch(e){}
}

function startGame(mode){currentMode=mode;setActiveTab(mode);currentSet=shuffle(allQuestions.filter(x=>x.mode===mode));currentIndex=0;right=0;answered=false;document.getElementById('challengeEnd').classList.remove('show');document.getElementById('studyArea').style.display='grid';updateStats();renderQuestion()}
function renderQuestion(){const item=currentSet[currentIndex];if(!item)return finishGame();answered=false;const flip=document.getElementById('flipShell');flip.classList.remove('flipped');flip.classList.add('locked');document.getElementById('levelText').textContent=`第 ${currentIndex+1} 關 / 共 ${currentSet.length} 關`;document.getElementById('formula').innerHTML='\\['+texExpr(item.q)+'\\]';document.getElementById('backQuestion').innerHTML='\\['+texExpr(item.q)+'\\]';document.getElementById('detailSteps').innerHTML=detailSteps(item).map(x=>`<li>${x}</li>`).join('');const choicesBox=document.getElementById('choices');choicesBox.innerHTML='';shuffle(item.choices).forEach(c=>{const btn=document.createElement('button');btn.className='choice';btn.innerHTML=renderChoice(c);btn.dataset.choice=c;btn.onclick=ev=>{ev.stopPropagation();checkAnswer(btn,c)};choicesBox.appendChild(btn)});typesetMath()}
function checkAnswer(btn,choice){if(answered)return;answered=true;const item=currentSet[currentIndex];document.querySelectorAll('.choice').forEach(b=>{if(b.dataset.choice===item.ans)b.classList.add('correct');else if(b===btn)b.classList.add('wrong')});const isCorrect=choice===item.ans;if(isCorrect)right++;playSound(isCorrect);document.getElementById('flipShell').classList.remove('locked');updateStats()}
function nextQuestion(){if(!currentSet.length)return;currentIndex++;if(currentIndex>=currentSet.length)finishGame();else renderQuestion();updateStats()}
function resetGame(){startGame(currentMode||'basic')}
function finishGame(){document.getElementById('studyArea').style.display='none';document.getElementById('challengeEnd').classList.add('show');const percent=currentSet.length?Math.round(right/currentSet.length*100):0;let msg=`你完成 ${currentSet.length} 題，答對 ${right} 題，正確率 ${percent}%。`;if(percent>=90)msg+=' 根號已經被你馴服。';else if(percent>=70)msg+=' 表現不錯，符號正負再盯緊一點。';else msg+=' 建議回到 m+n=a、mn=b 重新練一次。';document.getElementById('endMessage').textContent=msg}
function updateStats(){document.getElementById('rightCount').textContent=right;document.getElementById('totalCount').textContent=currentSet.length?`${Math.min(currentIndex+1,currentSet.length)}/${currentSet.length}`:'0';const progress=currentSet.length?Math.min(currentIndex,currentSet.length)/currentSet.length*100:0;document.getElementById('progress').style.width=progress+'%'}
function toggleRules(){const box=document.getElementById('ruleContent'),btn=document.getElementById('ruleBtn');box.classList.toggle('show');btn.textContent=box.classList.contains('show')?'收起解題規則':'解題規則';typesetMath()}
function toggleFlashcard(){if(!currentSet.length||!answered)return;document.getElementById('flipShell').classList.toggle('flipped');typesetMath()}
window.addEventListener('load',()=>startGame('estimate'));
</script>
