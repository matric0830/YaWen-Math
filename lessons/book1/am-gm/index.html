<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>算幾不等式｜Ya-Wen 的高中數學教室</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f1ff;
      color: #1f2937;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
    }

    main {
      width: min(760px, calc(100% - 32px));
      padding: 32px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 20px 50px rgba(60, 45, 120, 0.14);
    }

    h1 {
      margin: 0 0 12px;
      color: #5b42a6;
      font-size: clamp(2.2rem, 6vw, 4rem);
    }

    .formula {
      margin: 24px 0;
      padding: 18px;
      border-radius: 12px;
      background: #f0ecff;
      text-align: center;
      font-size: 1.6rem;
      font-weight: 900;
    }

    a {
      color: #5b42a6;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main>
    <h1>算幾不等式</h1>
    <p>若 a ≥ 0, b ≥ 0，則算術平均大於或等於幾何平均。</p>
    <div class="formula">(a + b) / 2 ≥ √ab</div>
    <p>等號成立於 a = b。</p>
    <p><a href="../../index.html">回首頁</a></p>
  </main>
</body>
</html>
