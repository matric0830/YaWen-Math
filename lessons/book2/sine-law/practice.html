<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>正弦定理練習題｜Ya-Wen 的高中數學教室</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <style>
        :root {
            --primary-color: #7c3aed;
            --primary-soft: #b9a4ee;
            --bg-color: #20272a;
            --panel-bg: rgba(9, 16, 18, 0.72);
            --card-bg: #1b2228;
            --text-main: #f8f2e8;
            --text-muted: rgba(255,255,255,.72);
            --success: #10b981;
            --error: #ef4444;
            --border: rgba(255,255,255,.18);
            --chalk: #fffdf4;
            --cream: #f1d2a0;
            --line: rgba(255,255,255,.18);
            --wood: #bd8959;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 88% 84%, rgba(255,255,255,.12) 0 18px, transparent 19px);
            color: var(--chalk);
            margin: 0;
            min-height: 100vh;
            overflow: auto;
        }

        .page {
            width: min(1380px, calc(100% - 44px));
            margin: 0 auto;
            padding: 14px 0 20px;
        }

        .page-header,
        .practice-shell {
            border: 2px solid var(--line);
            border-radius: 18px;
            background: var(--panel-bg);
            box-shadow: inset 0 0 0 1px rgba(0,0,0,.42);
        }

        .page-header {
            padding: 14px 20px;
            margin-bottom: 12px;
        }

        .header-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }

        .header-copy p {
            margin: 0 0 8px;
            color: var(--cream);
            font-weight: 900;
            font-size: 1rem;
        }

        .header-copy h1 {
            margin: 0;
            color: var(--chalk);
            font-size: clamp(2rem, 5vw, 3.8rem);
            line-height: 1.05;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            height: 52px;
            padding: 0 20px;
            border-radius: 999px;
            background: #f1d2a0;
            color: #17151d;
            text-decoration: none;
            font-weight: 900;
            white-space: nowrap;
        }

        /* 頂部導覽欄 */
        header {
            background-color: #1b2228;
            border-bottom: 1px solid var(--border);
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        header h1 {
            font-size: 0.95rem;
            margin: 0;
            color: var(--cream);
        }

        .navigation-tabs {
            display: flex;
            gap: 6px;
        }

        .tab-btn {
            background-color: #2a3238;
            border: 1px solid var(--border);
            color: var(--chalk);
            padding: 4px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* 雙欄主工作區 */
        .main-workspace {
            display: flex;
            height: calc(100vh - 180px);
            min-height: 540px;
            width: 100%;
        }

        /* 左側欄：嚴格鎖死滾動條，確保一頁看完整個詳解 */
        .left-panel {
            width: 50%;
            height: 100%;
            overflow: hidden; 
            padding: 10px;
            background-color: #161d22;
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .quiz-card {
            display: none;
            height: 100%;
        }

        .quiz-card.active {
            display: flex;
            flex-direction: column;
        }

        .question-text {
            font-size: 0.92rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 8px;
            background: #222a31;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            color: var(--chalk);
        }

        .question-text,
        .question-text strong,
        .question-text span,
        .question-text p,
        .question-text .katex,
        .question-text .katex * {
            color: var(--chalk) !important;
        }

        /* 選項橫排 */
        .options-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .option-btn {
            background-color: #242c33;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            padding: 6px 4px;
            text-align: left;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.1s ease;
            color: var(--chalk);
            display: flex;
            align-items: center;
        }

        .option-btn,
        .option-btn span,
        .option-btn p,
        .option-btn .katex,
        .option-btn .katex * {
            color: var(--chalk) !important;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            background-color: rgba(124,58,237,.18);
        }

        .option-label {
            font-weight: bold;
            margin-right: 6px;
            color: var(--primary-color);
            background-color: #2a3238;
            border: 1px solid var(--border);
            border-radius: 4px;
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.75rem;
        }

        .option-btn.correct { background-color: rgba(16,185,129,.16); border-color: var(--success); color: #d1fae5; font-weight: 600; }
        .option-btn.correct .option-label { color: white; background-color: var(--success); border-color: var(--success); }
        .option-btn.incorrect { background-color: rgba(239,68,68,.16); border-color: var(--error); color: #fecaca; }
        .option-btn.incorrect .option-label { color: white; background-color: var(--error); border-color: var(--error); }
        .option-btn:disabled { cursor: not-allowed; }

        /* 回饋區基本框架 */
        .rationale-box {
            background-color: #222a31;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.88rem;
            border-left: 4px solid var(--text-muted);
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            display: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            flex-grow: 1; /* 自適應高度撐滿 */
            color: var(--chalk);
        }

        .rationale-box.show { display: block; }
        .rationale-title { font-weight: bold; margin-bottom: 4px; font-size: 0.9rem; }
        .correct-answer-alert { font-weight: bold; color: #d1fae5; background-color: rgba(16,185,129,.16); padding: 2px 6px; border-radius: 4px; display: inline-block; font-size: 0.8rem; }

        .rationale-box,
        .rationale-box span,
        .rationale-box p,
        .rationale-box .katex,
        .rationale-box .katex * {
            color: var(--chalk) !important;
        }
        
        /* 緊湊高密度詳解方塊 */
        .process-box {
            background-color: #1e262d;
            border: 1px solid var(--border);
            color: var(--chalk);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.88rem;
            line-height: 1.35;
        }

        .process-section-title {
            font-weight: bold;
            color: var(--cream);
            margin-top: 4px;
            margin-bottom: 1px;
        }
        
        .process-box .process-section-title:first-of-type {
            margin-top: 0;
        }

        .process-box,
        .process-box span,
        .process-box p,
        .process-box .katex,
        .process-box .katex * {
            color: var(--chalk) !important;
        }

        /* 微調 KaTeX 區塊公式的上下邊距，徹底壓縮垂直佔用空間 */
        .process-box .katex-display {
            margin: 2px 0 !important;
        }

        .rationale-box.correct-style { border-left-color: var(--success); }
        .rationale-box.incorrect-style { border-left-color: var(--error); }

        /* 右側：平板手寫區（保持原樣不變） */
        .right-panel {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #161d22;
        }

        .canvas-toolbar {
            background-color: #1b2228;
            border-bottom: 1px solid var(--border);
            padding: 4px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 34px;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-label {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--cream);
        }

        .color-pick {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-pick.active {
            border-color: #fffdf4;
            transform: scale(1.05);
        }

        .btn-clear {
            background-color: #242c33;
            border: 1px solid var(--border);
            color: var(--chalk);
            padding: 1px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .btn-clear:hover {
            background-color: rgba(239,68,68,.16);
            color: #fecaca;
        }

        .btn-tool {
            background-color: #242c33;
            border: 1px solid var(--border);
            color: var(--chalk);
            padding: 1px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            line-height: 1.5;
        }

        .btn-tool:hover {
            background-color: rgba(255,255,255,.1);
        }

        .btn-tool.active {
            background-color: rgba(241,210,160,.18);
            border-color: #f1d2a0;
            color: #f1d2a0;
        }

        .canvas-container {
            flex-grow: 1;
            position: relative;
            background-color: #161d22;
            background-image: linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .site-footer {
            margin-top: 12px;
            padding: 10px 18px;
            background: var(--wood);
            color: #23160f;
            text-align: center;
            font-weight: 900;
        }

        @media (max-width: 900px) {
            .page {
                width: min(100% - 24px, 760px);
            }

            .header-row {
                flex-direction: column;
            }

            .main-workspace {
                flex-direction: column;
                height: auto;
                min-height: 0;
            }

            .left-panel,
            .right-panel {
                width: 100%;
                min-height: 420px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
    <section class="page-header">
        <div class="header-row">
            <div class="header-copy">
                <p>高中數學第二冊｜第四章 三角比的性質與應用｜主題 055</p>
                <h1>正弦定理練習題</h1>
            </div>
            <a class="back-link" href="index.html">回上一頁</a>
        </div>
    </section>

    <section class="practice-shell">
    <header>
        <h1>📐 正弦定理-練習題 </h1>
        <div class="navigation-tabs" id="tabs-container"></div>
    </header>

    <div class="main-workspace">
        <div class="left-panel" id="quiz-container"></div>

        <div class="right-panel">
            <div class="canvas-toolbar">
                <div class="toolbar-group">
                    <span class="toolbar-label">筆色：</span>
                    <div class="color-pick active" style="background-color: #000000;" onclick="changeColor('#000000', this)"></div>
                    <div class="color-pick" style="background-color: #1d4ed8;" onclick="changeColor('#1d4ed8', this)"></div>
                    <div class="color-pick" style="background-color: #b91c1c;" onclick="changeColor('#b91c1c', this)"></div>
                    <button type="button" class="btn-tool" id="eraser-btn" onclick="setEraser(this)">橡皮擦</button>
                </div>
                <div class="toolbar-group">
                    <span class="toolbar-label">粗細：</span>
                    <select id="brush-size" onchange="changeSize(this.value)" style="padding: 1px; font-size: 0.75rem;">
                        <option value="2">細</option>
                        <option value="4" selected>中</option>
                        <option value="6">粗</option>
                    </select>
                </div>
                <button class="btn-clear" onclick="clearCanvas()">清除計算區</button>
            </div>
            <div class="canvas-container" id="canvas-holder">
                <canvas id="paintCanvas"></canvas>
            </div>
        </div>
    </div>
    </section>
    </main>

    <footer class="site-footer">© Ya Wen 的數學教室｜讓數學不只會算，還能玩。</footer>

<script>
// 資料庫：第 5 題改成「完全獨立題目」，去除承上題的依賴
const quizData = [
    {
        questionNumber: 1,
        question: "在 $\\triangle ABC$ 中，已知 $\\angle A = 45^\\circ$、$\\angle B = 60^\\circ$，且 $b = 3\\sqrt{2}$。求 $a$ 的長度。",
        correctProcess: `
            <div class="process-section-title">根據正弦定理公式：</div>
            $$\\frac{a}{\\sin A} = \\frac{b}{\\sin B}$$
            
            <div class="process-section-title">代入已知數值：</div>
            $$\\frac{a}{\\sin 45^\\circ} = \\frac{3\\sqrt{2}}{\\sin 60^\\circ} \\Rightarrow \\frac{a}{\\frac{\\sqrt{2}}{2}} = \\frac{3\\sqrt{2}}{\\frac{\\sqrt{3}}{2}}$$
            
            <div class="process-section-title">移項化簡整理：</div>
            $$a = \\frac{3\\sqrt{2} \\cdot \\frac{\\sqrt{2}}{2}}{\\frac{\\sqrt{3}}{2}} = \\frac{3}{\\frac{\\sqrt{3}}{2}} = \\frac{6}{\\sqrt{3}} = 2\\sqrt{3}$$
        `
    },
    {
        questionNumber: 2,
        question: "在 $\\triangle ABC$ 中，已知 $\\angle A = 30^\\circ$，且其外接圓半徑 $R = 5$。求 $a$ 的邊長。",
        correctProcess: `
            <div class="process-section-title">根據外接圓正弦定理公式：</div>
            $$\\frac{a}{\\sin A} = 2R$$
            
            <div class="process-section-title">代入已知數值：</div>
            $$\\frac{a}{\\sin 30^\\circ} = 2 \\cdot 5 \\Rightarrow \\frac{a}{\\frac{1}{2}} = 10$$
            
            <div class="process-section-title">移項化簡整理：</div>
            $$a = 10 \\cdot \\sin 30^\\circ = 10 \\cdot \\frac{1}{2} = 5$$
        `
    },
    {
        questionNumber: 3,
        question: "在 $\\triangle ABC$ 中，已知三內角比為 $\\angle A : \\angle B : \\angle C = 1 : 2 : 3$。求三邊長的比 $a : b : c$。",
        correctProcess: `
            <div class="process-section-title">根據內角和比例求出各角度：</div>
            $$\\angle A = 30^\\circ, \\quad \\angle B = 60^\\circ, \\quad \\angle C = 90^\\circ$$
            
            <div class="process-section-title">根據正弦定理邊角比關係：</div>
            $$a : b : c = \\sin A : \\sin B : \\sin C = \\sin 30^\\circ : \\sin 60^\\circ : \\sin 90^\\circ$$
            
            <div class="process-section-title">代入數值化簡整理：</div>
            $$a : b : c = \\frac{1}{2} : \\frac{\\sqrt{3}}{2} : 1 = 1 : \\sqrt{3} : 2$$
        `
    },
    {
        questionNumber: 4,
        question: "在 $\\triangle ABC$ 中，已知 $b = 4$，$c = 4\\sqrt{2}$，且 $\\angle B = 30^\\circ$。求 $\\sin C$ 的值。",
        correctProcess: `
            <div class="process-section-title">根據正弦定理公式：</div>
            $$\\frac{b}{\\sin B} = \\frac{c}{\\sin C}$$
            
            <div class="process-section-title">代入已知數值：</div>
            $$\\frac{4}{\\sin 30^\\circ} = \\frac{4\\sqrt{2}}{\\sin C} \\Rightarrow \\frac{4}{\\frac{1}{2}} = \\frac{4\\sqrt{2}}{\\sin C}$$
            
            <div class="process-section-title">移項化簡整理：</div>
            $$8 = \\frac{4\\sqrt{2}}{\\sin C} \\Rightarrow \\sin C = \\frac{4\\sqrt{2}}{8} = \\frac{\\sqrt{2}}{2}$$
        `
    },
    {
        questionNumber: 5,
        question: "在 $\\triangle ABC$ 中，已知 $b = 4$，$c = 4\\sqrt{2}$，$\\angle B = 30^\\circ$，且該三角形為「鈍角三角形」，求 $\\angle C$ 的度數。",
        correctProcess: `
            <div class="process-section-title">由正弦定理求出其正弦值：</div>
            $$\\frac{4}{\\sin 30^\\circ} = \\frac{4\\sqrt{2}}{\\sin C} \\Rightarrow \\sin C = \\frac{\\sqrt{2}}{2}$$
            
            <div class="process-section-title">尋找對應之所有可能角度：</div>
            $$\\angle C = 45^\\circ \\quad \\text{或} \\quad 135^\\circ$$
            
            <div class="process-section-title">依據「鈍角三角形」限制條件篩選：</div>
            $$\\text{為了滿足具有一個大於 } 90^\\circ \\text{ 內角之特性，故 } \\angle C \\text{ 必為鈍角：}$$
            $$\\angle C = 135^\\circ$$
        `
    }
];

// 選項文字庫
const quizOptions = [
    ["$2\\sqrt{3}$", "$3\\sqrt{3}$", "$2\\sqrt{2}$", "$6$"],
    ["$5$", "$10$", "$5\\sqrt{3}$", "$\\frac{5}{2}$"],
    ["$1 : \\sqrt{3} : 2$", "$1 : 2 : 3$", "$1 : \\sqrt{2} : \\sqrt{3}$", "$1 : 1 : \\sqrt{2}$"],
    ["$\\frac{\\sqrt{2}}{2}$", "$\\frac{1}{2}$", "$\\frac{\\sqrt{3}}{2}$", "$1$"],
    ["$135^\\circ$", "$45^\\circ$", "$120^\\circ$", "$150^\\circ$"]
];

const tabsContainer = document.getElementById('tabs-container');
const quizContainer = document.getElementById('quiz-container');
const optionLetters = ['A', 'B', 'C', 'D'];

// 動態初始化佈局
quizData.forEach((q, qIndex) => {
    const tabBtn = document.createElement('button');
    tabBtn.className = `tab-btn ${qIndex === 0 ? 'active' : ''}`;
    tabBtn.innerText = q.questionNumber;
    tabBtn.id = `tab-btn-${qIndex}`;
    tabBtn.onclick = () => switchQuestion(qIndex);
    tabsContainer.appendChild(tabBtn);

    const card = document.createElement('div');
    card.className = `quiz-card ${qIndex === 0 ? 'active' : ''}`;
    card.id = `quiz-card-${qIndex}`;
    
    let cardHtml = `
        <div class="question-text"><strong>第 ${q.questionNumber} 題：</strong>${q.question}</div>
        <div class="options-container" id="options-${qIndex}">
    `;
    
    quizOptions[qIndex].forEach((optText, oIndex) => {
        const isCorrect = (oIndex === 0);
        cardHtml += `
            <button class="option-btn" id="opt-btn-${qIndex}-${oIndex}" onclick="checkAnswer(${qIndex}, ${oIndex}, ${isCorrect})">
                <span class="option-label">${optionLetters[oIndex]}</span>
                <span>${optText}</span>
            </button>
        `;
    });
    
    cardHtml += `
        </div>
        <div class="rationale-box" id="rationale-${qIndex}"></div>
    `;
    
    card.innerHTML = cardHtml;
    quizContainer.appendChild(card);
});

function switchQuestion(targetIndex) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.quiz-card').forEach(card => card.classList.remove('active'));
    
    document.getElementById(`tab-btn-${targetIndex}`).classList.add('active');
    document.getElementById(`quiz-card-${targetIndex}`).classList.add('active');
}

// 作答判定邏輯
function checkAnswer(qIndex, oIndex, isCorrect) {
    const optionsContainer = document.getElementById(`options-${qIndex}`);
    const buttons = optionsContainer.getElementsByClassName('option-btn');
    const rationaleBox = document.getElementById(`rationale-${qIndex}`);
    
    for (let i = 0; i < buttons.length; i++) {
        buttons[i].disabled = true;
        if (i === 0) {
            buttons[i].classList.add('correct');
        }
    }

    if (!isCorrect) {
        document.getElementById(`opt-btn-${qIndex}-${oIndex}`).classList.add('incorrect');
        rationaleBox.className = 'rationale-box show incorrect-style';
        
        rationaleBox.innerHTML = `
            <div class="rationale-title" style="color:var(--error);">❌ 答錯囉！正確解析如下：</div>
            <div class="process-box">
                ${quizData[qIndex].correctProcess}
            </div>
        `;
    } else {
        rationaleBox.className = 'rationale-box show correct-style';
        
        rationaleBox.innerHTML = `
            <div class="rationale-title" style="color:var(--success)">🎉 完全正確！</div>
            <div class="correct-answer-alert" style="margin-bottom: 0;">💡 本題正確選項為：(A) ${quizOptions[qIndex][0]}</div>
        `;
    }

    // 局部動態公式渲染
    renderMathInElement(rationaleBox, {
        delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
        ],
        throwOnError : false
    });
}

// ================= Tablet Canvas 畫布邏輯 =================
const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d');
const holder = document.getElementById('canvas-holder');

let isDrawing = false;
let currentColor = '#000000';
let currentSize = 4;
let isErasing = false;
let lastColorElement = null;

function resizeCanvas() {
    canvas.width = holder.clientWidth;
    canvas.height = holder.clientHeight;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
}

window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 200);
lastColorElement = document.querySelector('.color-pick.active');

canvas.addEventListener('mousedown', startDrawing);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDrawing);
canvas.addEventListener('mouseout', stopDrawing);

canvas.addEventListener('touchstart', startDrawing, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', stopDrawing);

function getCoords(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length > 0) {
        return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    } else {
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }
}

function startDrawing(e) {
    e.preventDefault();
    isDrawing = true;
    const coords = getCoords(e);
    ctx.beginPath();
    ctx.moveTo(coords.x, coords.y);
}

function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const coords = getCoords(e);
    ctx.lineWidth = currentSize;
    ctx.globalCompositeOperation = isErasing ? 'destination-out' : 'source-over';
    ctx.strokeStyle = currentColor;
    ctx.lineTo(coords.x, coords.y);
    ctx.stroke();
}

function stopDrawing() { isDrawing = false; }

function changeColor(color, element) {
    currentColor = color;
    isErasing = false;
    ctx.globalCompositeOperation = 'source-over';
    document.querySelectorAll('.color-pick').forEach(el => el.classList.remove('active'));
    element.classList.add('active');
    lastColorElement = element;
    const eraserBtn = document.getElementById('eraser-btn');
    if (eraserBtn) eraserBtn.classList.remove('active');
}

function setEraser(element) {
    isErasing = !isErasing;
    document.querySelectorAll('.color-pick').forEach(el => el.classList.remove('active'));
    if (isErasing) {
        element.classList.add('active');
    } else {
        element.classList.remove('active');
        if (lastColorElement) lastColorElement.classList.add('active');
    }
}

function changeSize(size) { currentSize = parseInt(size); }
function clearCanvas() {
    ctx.globalCompositeOperation = 'source-over';
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// 初始化全域公式渲染
document.addEventListener("DOMContentLoaded", function() {
    renderMathInElement(document.body, {
        delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
        ],
        throwOnError : false
    });
});
</script>
